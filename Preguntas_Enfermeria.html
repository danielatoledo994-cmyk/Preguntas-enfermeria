/* FUNCIONES */

function startQuiz(){

const area=document.getElementById("area").value;
const nivel=document.getElementById("nivel").value;

quizData=[...banco[area][nivel]];
shuffleArray(quizData);

current=0;
errors=0;

document.getElementById("portada").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("restartBtn").style.display="none";
document.getElementById("nextBtn").style.display="inline-block";

loadQuestion();
updateErrors();
}

function loadQuestion(){

clearInterval(timer);
timeLeft=20;
startTimer();

document.getElementById("feedback").innerText="";

const q=quizData[current];
document.getElementById("question").innerText=q.q;

const answersDiv=document.getElementById("answers");
answersDiv.innerHTML="";

let opciones=q.a.map((t,i)=>({texto:t,correcto:i===q.correct}));
shuffleArray(opciones);

opciones.forEach(op=>{
const btn=document.createElement("div");
btn.className="answer";
btn.innerText=op.texto;
btn.onclick=()=>checkAnswer(op.correcto);
answersDiv.appendChild(btn);
});
}

function startTimer(){
timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="Tiempo: "+timeLeft;

if(timeLeft<=0){
clearInterval(timer);
document.getElementById("feedback").innerText="⏳ ¡SE ACABÓ EL TIEMPO!";
document.getElementById("nextBtn").style.display="none";
document.getElementById("restartBtn").style.display="inline-block";
}
},1000);
}

function checkAnswer(correcto){

clearInterval(timer);

if(!correcto){
errors++;
document.getElementById("feedback").innerText="❌ Incorrecto";
updateErrors();

if(errors>=3){
document.getElementById("feedback").innerText="💀 3 errores. Reinicia.";
document.getElementById("nextBtn").style.display="none";
document.getElementById("restartBtn").style.display="inline-block";
}
}else{
document.getElementById("feedback").innerText="✅ Correcto";
}
}

function nextQuestion(){
current++;

if(current>=quizData.length){
document.getElementById("feedback").innerText="🎉 Terminaste";
document.getElementById("nextBtn").style.display="none";
document.getElementById("restartBtn").style.display="inline-block";
return;
}

loadQuestion();
}

function updateErrors(){
document.getElementById("errors").innerText="Errores: "+errors+"/3";
}

function restartQuiz(){
current=0;
errors=0;
shuffleArray(quizData);

document.getElementById("restartBtn").style.display="none";
document.getElementById("nextBtn").style.display="inline-block";

loadQuestion();
updateErrors();
}

function goHome(){
clearInterval(timer);

document.getElementById("quiz").style.display="none";
document.getElementById("portada").style.display="block";

current=0;
errors=0;

document.getElementById("feedback").innerText="";
}

</script>
